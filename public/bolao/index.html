<!--
  ===========================================================
  BOLÃO - Página principal (HTML)
  -----------------------------------------------------------
  Esta é a ESTRUTURA do site. Aqui definimos APENAS o conteúdo
  e a hierarquia dos elementos. Nada de estilo (isso fica no
  CSS) e nada de comportamento (isso fica no JS).

  Seções principais:
    1. <header>  -> cabeçalho com o título e os botões de aba
    2. #tab-jogos     -> aba do JOGADOR (ver jogos e palpitar)
    3. #tab-ranking   -> aba do RANKING em tempo real
    4. #tab-moderacao -> aba da MODERAÇÃO (criar jogos, lançar
                         placares e definir o autor do gol)
  ===========================================================
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bolão da Galera</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- CABEÇALHO + NAVEGAÇÃO ENTRE ABAS -->
  <header class="topo">
    <h1>⚽ Bolão da Galera</h1>
    <nav class="abas">
      <button class="aba-btn ativa" data-aba="tab-jogos">Jogos & Palpites</button>
      <button class="aba-btn"        data-aba="tab-ranking">Ranking</button>
      <button class="aba-btn"        data-aba="tab-moderacao">Moderação</button>
    </nav>

    <!-- Identificação simples do jogador (sem login) -->
    <div class="jogador-box">
      <label for="nome-jogador">Seu nome:</label>
      <input type="text" id="nome-jogador" placeholder="Digite seu nome" />
      <button id="btn-salvar-nome">Entrar</button>
      <span id="jogador-atual"></span>
    </div>
  </header>


  <!-- ====================== ABA 1: JOGOS ====================== -->
  <!-- O JS preenche #lista-jogos com cards de jogos abertos.    -->
  <!-- Cada card tem inputs de placar + nome do goleador.        -->
  <section id="tab-jogos" class="aba ativa">
    <h2>Jogos abertos para palpite</h2>
    <p class="dica">Acertar o placar = <b>3 pts</b> • acertar o vencedor = <b>1 pt</b> • acertar o goleador = <b>+1 pt</b></p>
    <div id="lista-jogos" class="grid-jogos"></div>
  </section>


  <!-- ====================== ABA 2: RANKING ==================== -->
  <!-- Atualizado em tempo real (escuta eventos do localStorage). -->
  <section id="tab-ranking" class="aba">
    <h2>🏆 Ranking</h2>
    <table class="tabela-ranking">
      <thead>
        <tr><th>#</th><th>Jogador</th><th>Pontos</th></tr>
      </thead>
      <tbody id="corpo-ranking"></tbody>
    </table>
  </section>


  <!-- ===================== ABA 3: MODERAÇÃO =================== -->
  <!-- 3a) Formulário para CRIAR/POSTAR um novo jogo do dia.      -->
  <!-- 3b) Lista de jogos abertos com formulário para LANÇAR      -->
  <!--     o placar final + nome do goleador (encerra o jogo e   -->
  <!--     calcula os pontos automaticamente).                   -->
  <section id="tab-moderacao" class="aba">
    <h2>🛠️ Moderação</h2>

    <div class="card">
      <h3>Postar novo jogo</h3>
      <form id="form-novo-jogo" class="form-linha">
        <input type="text" id="time-casa"  placeholder="Time da casa"     required />
        <span>x</span>
        <input type="text" id="time-fora"  placeholder="Time visitante"   required />
        <input type="datetime-local" id="data-jogo" required />
        <button type="submit">Postar jogo</button>
      </form>
    </div>

    <div class="card">
      <h3>Encerrar jogos (lançar placar)</h3>
      <div id="lista-encerrar"></div>
    </div>

    <div class="card perigo">
      <h3>Zona perigosa</h3>
      <button id="btn-resetar">Resetar TUDO (apaga jogos, palpites e ranking)</button>
    </div>
  </section>


  <!-- O script.js contém TODA a lógica (comportamento) do site. -->
  <script src="script.js"></script>
</body>
</html>
